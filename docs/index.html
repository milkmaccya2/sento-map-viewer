<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銭湯マップ - 13年分の訪問記録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Sans JP", "Noto Sans Japanese", "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", メイリオ, Meiryo, "ＭＳ Ｐゴシック", Osaka, sans-serif;
      background: #f5f5f4;
      color: #1c1917;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* --- Sidebar --- */
    #sidebar {
      width: 380px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e7e5e4;
      box-shadow: 2px 0 8px rgba(0,0,0,0.04);
    }

    #sidebar-header {
      padding: 16px 24px;
      background: #2233a1;
      border-bottom: 1px solid #e7e5e4;
      text-align: center;
    }

    #sidebar-header img {
      width: 160px;
      display: inline-block;
    }

    /* --- Stats --- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid #e7e5e4;
    }

    .stat-card {
      background: #2233a1;
      border: none;
      border-radius: 0;
      padding: 14px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
    }

    .stat-card .label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
      font-weight: 500;
    }

    /* --- Controls --- */
    .controls {
      padding: 16px 24px;
      border-bottom: 1px solid #e7e5e4;
    }

    .controls label {
      font-size: 12px;
      color: #78716c;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    .year-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .year-btn {
      padding: 5px 12px;
      border: 1px solid #d6d3d1;
      background: #fff;
      color: #57534e;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .year-btn:hover {
      border-color: #2233a1;
      color: #2233a1;
      background: #eff6ff;
    }

    .year-btn.active {
      background: #2233a1;
      color: #fff;
      border-color: #2233a1;
    }

    .toggle-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #d6d3d1;
      background: #fff;
      color: #57534e;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .toggle-btn:hover {
      border-color: #2233a1;
      color: #2233a1;
      background: #eff6ff;
    }

    .toggle-btn.active {
      background: #2233a1;
      color: #fff;
      border-color: #2233a1;
    }

    /* --- Ranking --- */
    #ranking-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    #ranking-section h3 {
      font-size: 13px;
      color: #78716c;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }

    .ranking-item:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .ranking-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f5f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #a8a29e;
      flex-shrink: 0;
    }

    .ranking-item:nth-child(1) .ranking-number {
      background: #2233a1;
      color: #fff;
    }

    .ranking-item:nth-child(2) .ranking-number {
      background: #3b82f6;
      color: #fff;
    }

    .ranking-item:nth-child(3) .ranking-number {
      background: #93c5fd;
      color: #fff;
    }

    .ranking-info { flex: 1; min-width: 0; }

    .ranking-name {
      font-size: 14px;
      font-weight: 600;
      color: #1c1917;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ranking-meta {
      font-size: 11px;
      color: #a8a29e;
    }

    .ranking-bar-wrap {
      width: 64px;
      flex-shrink: 0;
    }

    .ranking-bar {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #3b82f6, #2233a1);
      transition: width 0.3s;
    }

    .ranking-count {
      font-size: 11px;
      color: #78716c;
      text-align: right;
      margin-top: 3px;
      font-weight: 600;
    }

    /* --- Map --- */
    #map {
      flex: 1;
    }

    /* Popup styling */
    .sento-popup h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1c1917;
    }

    .sento-popup .visit-count {
      font-size: 22px;
      font-weight: 800;
      color: #2233a1;
    }

    .sento-popup .visit-label {
      font-size: 13px;
      color: #78716c;
    }

    .sento-popup .dates {
      font-size: 12px;
      color: #a8a29e;
      margin-top: 6px;
    }

    .sento-popup .year-breakdown {
      margin-top: 8px;
      font-size: 12px;
      color: #57534e;
    }

    .sento-popup .year-breakdown .year-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }

    .sento-popup .year-bar {
      height: 5px;
      background: #bfdbfe;
      border-radius: 3px;
      flex: 1;
      margin: 0 8px;
    }

    .sento-popup .year-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #2233a1);
      border-radius: 3px;
    }

    .sento-popup a {
      display: inline-block;
      margin-top: 10px;
      color: #2233a1;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
    }

    .sento-popup a:hover {
      text-decoration: underline;
    }

    /* Mobile */
    .mobile-toggle {
      display: none;
    }

    @media (max-width: 768px) {
      #app { flex-direction: column; position: relative; }

      #map {
        width: 100%;
        height: 100vh;
        order: -1;
      }

      #sidebar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 60vh;
        border-right: none;
        border-top: 1px solid #e7e5e4;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
        transform: translateY(calc(100% - 48px));
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      #sidebar.open {
        transform: translateY(0);
      }

      .mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        cursor: pointer;
        user-select: none;
      }

      .mobile-toggle .handle {
        width: 40px;
        height: 4px;
        background: #d6d3d1;
        border-radius: 2px;
      }

      #sidebar-header {
        padding: 12px 20px;
      }

      #sidebar-header h1 {
        font-size: 18px;
      }

      .stats-grid {
        padding: 8px 16px;
        gap: 6px;
      }

      .stat-card {
        padding: 10px;
      }

      .stat-card .value {
        font-size: 18px;
      }

      .controls {
        padding: 10px 16px;
      }

      .year-btn {
        padding: 3px 10px;
        font-size: 11px;
      }

      #ranking-section {
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <div class="handle"></div>
      </div>
      <div id="sidebar-header">
        <img src="logo.webp" alt="セントウマップ SENTO MAP">
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="stat-total">-</div>
          <div class="label">総訪問回数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-facilities">-</div>
          <div class="label">施設数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-first">-</div>
          <div class="label">最初の訪問</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-last">-</div>
          <div class="label">最新の訪問</div>
        </div>
      </div>

      <div class="controls">
        <label>年で絞り込み</label>
        <div class="year-buttons" id="year-buttons"></div>
        <div class="toggle-row">
          <button class="toggle-btn active" data-mode="markers">マーカー</button>
          <button class="toggle-btn" data-mode="heat">ヒートマップ</button>
        </div>
      </div>

      <div id="ranking-section">
        <h3>訪問回数ランキング</h3>
        <div id="ranking-list"></div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script id="sento-data" src="sento-data.js"></script>
  <script>
    let map, markersLayer, heatLayer;
    let allData = [];
    let selectedYear = null;
    let currentMode = 'markers';

    function init() {
      allData = SENTO_DATA;

      initMap();
      initYearButtons();
      initModeToggle();
      render();
    }

    function initMap() {
      map = L.map('map', {
        center: [35.7, 139.7],
        zoom: 10,
        zoomControl: false,
      });

      L.control.zoom({ position: 'topright' }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19,
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
    }

    function initYearButtons() {
      const years = new Set();
      allData.forEach(f => Object.keys(f.visits_by_year).forEach(y => years.add(y)));
      const sorted = [...years].sort();

      const container = document.getElementById('year-buttons');

      const allBtn = document.createElement('button');
      allBtn.className = 'year-btn active';
      allBtn.textContent = '全期間';
      allBtn.addEventListener('click', () => selectYear(null));
      container.appendChild(allBtn);

      sorted.forEach(year => {
        const btn = document.createElement('button');
        btn.className = 'year-btn';
        btn.textContent = year;
        btn.dataset.year = year;
        btn.addEventListener('click', () => selectYear(year));
        container.appendChild(btn);
      });
    }

    function initModeToggle() {
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          renderMap();
        });
      });
    }

    function selectYear(year) {
      selectedYear = year;
      document.querySelectorAll('.year-btn').forEach(btn => {
        btn.classList.toggle('active',
          year === null ? btn.textContent === '全期間' : btn.dataset.year === year
        );
      });
      render();
    }

    function getFilteredData() {
      if (!selectedYear) return allData;

      return allData
        .filter(f => f.visits_by_year[selectedYear])
        .map(f => ({
          ...f,
          total_visits: f.visits_by_year[selectedYear],
          visit_dates: f.visit_dates.filter(d => d.startsWith(selectedYear)),
        }))
        .sort((a, b) => b.total_visits - a.total_visits);
    }

    function render() {
      const data = getFilteredData();
      renderStats(data);
      renderRanking(data);
      renderMap();
    }

    function renderStats(data) {
      const total = data.reduce((s, f) => s + f.total_visits, 0);
      const allDates = data.flatMap(f => f.visit_dates).sort();

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-facilities').textContent = data.length;
      document.getElementById('stat-first').textContent = allDates[0] ? allDates[0].slice(0, 7) : '-';
      document.getElementById('stat-last').textContent = allDates.length ? allDates[allDates.length - 1].slice(0, 7) : '-';
    }

    function renderRanking(data) {
      const list = document.getElementById('ranking-list');
      const maxVisits = data.length ? data[0].total_visits : 1;

      list.innerHTML = data.map((f, i) => `
        <div class="ranking-item" data-idx="${i}" onclick="flyTo(${f.lat}, ${f.lng})">
          <div class="ranking-number">${i + 1}</div>
          <div class="ranking-info">
            <div class="ranking-name">${f.name_ja}</div>
            <div class="ranking-meta">${f.visit_dates[0] || ''} 〜</div>
          </div>
          <div class="ranking-bar-wrap">
            <div class="ranking-bar" style="width: ${(f.total_visits / maxVisits) * 100}%"></div>
            <div class="ranking-count">${f.total_visits}回</div>
          </div>
        </div>
      `).join('');
    }

    function renderMap() {
      const data = getFilteredData();
      markersLayer.clearLayers();

      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      if (currentMode === 'heat') {
        const points = data.map(f => [f.lat, f.lng, f.total_visits]);
        heatLayer = L.heatLayer(points, {
          radius: 35,
          blur: 25,
          maxZoom: 13,
          minOpacity: 0.35,
          max: Math.max(...data.map(f => f.total_visits)),
          gradient: {
            0.1: '#bfdbfe',
            0.3: '#93c5fd',
            0.5: '#3b82f6',
            0.7: '#2233a1',
            0.85: '#1e3a8a',
            1.0: '#172554',
          },
        }).addTo(map);
      } else {
        const maxVisits = Math.max(...data.map(f => f.total_visits), 1);

        data.forEach(f => {
          const radius = 6 + (f.total_visits / maxVisits) * 24;

          const marker = L.circleMarker([f.lat, f.lng], {
            radius: radius,
            fillColor: '#2233a1',
            fillOpacity: 0.65,
            color: '#fff',
            weight: 2,
          });

          marker.bindPopup(createPopup(f), { maxWidth: 280 });
          markersLayer.addLayer(marker);
        });
      }
    }

    function createPopup(f) {
      const maxYear = Math.max(...Object.values(f.visits_by_year));
      const yearBars = Object.entries(f.visits_by_year)
        .map(([y, c]) => `
          <div class="year-row">
            <span>${y}</span>
            <div class="year-bar"><div class="year-bar-fill" style="width:${(c / maxYear) * 100}%"></div></div>
            <span>${c}回</span>
          </div>
        `).join('');

      const urlLink = f.url
        ? `<a href="${f.url}" target="_blank" rel="noopener">公式サイト →</a>`
        : '';

      return `
        <div class="sento-popup">
          <h3>${f.name_ja}</h3>
          <div>
            <span class="visit-count">${f.total_visits}</span>
            <span class="visit-label">回訪問</span>
          </div>
          <div class="dates">${f.first_visit} 〜 ${f.last_visit}</div>
          <div class="year-breakdown">${yearBars}</div>
          ${urlLink}
        </div>
      `;
    }

    function flyTo(lat, lng) {
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
      }
      map.flyTo([lat, lng], 14, { duration: 0.8 });
      setTimeout(() => {
        markersLayer.eachLayer(layer => {
          if (layer.getLatLng().lat === lat && layer.getLatLng().lng === lng) {
            layer.openPopup();
          }
        });
      }, window.innerWidth <= 768 ? 400 : 0);
    }

    init();
  </script>
</body>
</html>
