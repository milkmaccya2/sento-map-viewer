<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銭湯マップ - 13年分の訪問記録</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* --- Sidebar --- */
    #sidebar {
      width: 360px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #334155;
    }

    #sidebar-header {
      padding: 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    #sidebar-header h1 {
      font-size: 20px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #sidebar-header .subtitle {
      font-size: 12px;
      color: #94a3b8;
    }

    /* --- Stats --- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
    }

    .stat-card {
      background: #0f172a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: #f97316;
    }

    .stat-card .label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* --- Controls --- */
    .controls {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
    }

    .controls label {
      font-size: 12px;
      color: #94a3b8;
      display: block;
      margin-bottom: 6px;
    }

    .year-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .year-btn {
      padding: 4px 10px;
      border: 1px solid #475569;
      background: transparent;
      color: #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .year-btn:hover { border-color: #f97316; color: #f97316; }
    .year-btn.active { background: #f97316; color: #fff; border-color: #f97316; }

    .toggle-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .toggle-btn {
      flex: 1;
      padding: 6px;
      border: 1px solid #475569;
      background: transparent;
      color: #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .toggle-btn:hover { border-color: #f97316; color: #f97316; }
    .toggle-btn.active { background: #f97316; color: #fff; border-color: #f97316; }

    /* --- Ranking --- */
    #ranking-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    #ranking-section h3 {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .ranking-item:hover { background: #334155; }

    .ranking-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .ranking-item:nth-child(-n+3) .ranking-number {
      background: #f97316;
      color: #fff;
    }

    .ranking-info { flex: 1; min-width: 0; }

    .ranking-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ranking-meta {
      font-size: 11px;
      color: #64748b;
    }

    .ranking-bar-wrap {
      width: 60px;
      flex-shrink: 0;
    }

    .ranking-bar {
      height: 6px;
      border-radius: 3px;
      background: #f97316;
      transition: width 0.3s;
    }

    .ranking-count {
      font-size: 11px;
      color: #94a3b8;
      text-align: right;
      margin-top: 2px;
    }

    /* --- Map --- */
    #map {
      flex: 1;
    }

    /* Popup styling */
    .sento-popup h3 {
      font-size: 15px;
      margin-bottom: 4px;
      color: #1e293b;
    }

    .sento-popup .visit-count {
      font-size: 20px;
      font-weight: 700;
      color: #f97316;
    }

    .sento-popup .visit-label {
      font-size: 12px;
      color: #64748b;
    }

    .sento-popup .dates {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }

    .sento-popup .year-breakdown {
      margin-top: 6px;
      font-size: 11px;
      color: #64748b;
    }

    .sento-popup .year-breakdown .year-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .sento-popup .year-bar {
      height: 4px;
      background: #fed7aa;
      border-radius: 2px;
      flex: 1;
      margin: 0 6px;
    }

    .sento-popup .year-bar-fill {
      height: 100%;
      background: #f97316;
      border-radius: 2px;
    }

    .sento-popup a {
      display: inline-block;
      margin-top: 8px;
      color: #f97316;
      font-size: 12px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #sidebar {
        width: 100%;
        height: 45vh;
        border-right: none;
        border-bottom: 1px solid #334155;
      }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>銭湯マップ</h1>
        <div class="subtitle">13年分のGoogle Mapsタイムラインから</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="stat-total">-</div>
          <div class="label">総訪問回数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-facilities">-</div>
          <div class="label">施設数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-first">-</div>
          <div class="label">最初の訪問</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stat-last">-</div>
          <div class="label">最新の訪問</div>
        </div>
      </div>

      <div class="controls">
        <label>年で絞り込み</label>
        <div class="year-buttons" id="year-buttons"></div>
        <div class="toggle-row">
          <button class="toggle-btn active" data-mode="markers">マーカー</button>
          <button class="toggle-btn" data-mode="heat">ヒートマップ</button>
        </div>
      </div>

      <div id="ranking-section">
        <h3>訪問回数ランキング</h3>
        <div id="ranking-list"></div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    let map, markersLayer, heatLayer;
    let allData = [];
    let selectedYear = null;
    let currentMode = 'markers';

    async function init() {
      const res = await fetch('sento-data.json');
      allData = await res.json();

      initMap();
      initYearButtons();
      initModeToggle();
      render();
    }

    function initMap() {
      map = L.map('map', {
        center: [35.7, 139.7],
        zoom: 10,
        zoomControl: false,
      });

      L.control.zoom({ position: 'topright' }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19,
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
    }

    function initYearButtons() {
      const years = new Set();
      allData.forEach(f => Object.keys(f.visits_by_year).forEach(y => years.add(y)));
      const sorted = [...years].sort();

      const container = document.getElementById('year-buttons');

      const allBtn = document.createElement('button');
      allBtn.className = 'year-btn active';
      allBtn.textContent = '全期間';
      allBtn.addEventListener('click', () => selectYear(null));
      container.appendChild(allBtn);

      sorted.forEach(year => {
        const btn = document.createElement('button');
        btn.className = 'year-btn';
        btn.textContent = year;
        btn.dataset.year = year;
        btn.addEventListener('click', () => selectYear(year));
        container.appendChild(btn);
      });
    }

    function initModeToggle() {
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          renderMap();
        });
      });
    }

    function selectYear(year) {
      selectedYear = year;
      document.querySelectorAll('.year-btn').forEach(btn => {
        btn.classList.toggle('active',
          year === null ? btn.textContent === '全期間' : btn.dataset.year === year
        );
      });
      render();
    }

    function getFilteredData() {
      if (!selectedYear) return allData;

      return allData
        .filter(f => f.visits_by_year[selectedYear])
        .map(f => ({
          ...f,
          total_visits: f.visits_by_year[selectedYear],
          visit_dates: f.visit_dates.filter(d => d.startsWith(selectedYear)),
        }))
        .sort((a, b) => b.total_visits - a.total_visits);
    }

    function render() {
      const data = getFilteredData();
      renderStats(data);
      renderRanking(data);
      renderMap();
    }

    function renderStats(data) {
      const total = data.reduce((s, f) => s + f.total_visits, 0);
      const allDates = data.flatMap(f => f.visit_dates).sort();

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-facilities').textContent = data.length;
      document.getElementById('stat-first').textContent = allDates[0] ? allDates[0].slice(0, 7) : '-';
      document.getElementById('stat-last').textContent = allDates.length ? allDates[allDates.length - 1].slice(0, 7) : '-';
    }

    function renderRanking(data) {
      const list = document.getElementById('ranking-list');
      const maxVisits = data.length ? data[0].total_visits : 1;

      list.innerHTML = data.map((f, i) => `
        <div class="ranking-item" data-idx="${i}" onclick="flyTo(${f.lat}, ${f.lng}, '${f.name}')">
          <div class="ranking-number">${i + 1}</div>
          <div class="ranking-info">
            <div class="ranking-name">${f.name_ja}</div>
            <div class="ranking-meta">${f.visit_dates[0] || ''} 〜</div>
          </div>
          <div class="ranking-bar-wrap">
            <div class="ranking-bar" style="width: ${(f.total_visits / maxVisits) * 100}%"></div>
            <div class="ranking-count">${f.total_visits}回</div>
          </div>
        </div>
      `).join('');
    }

    function renderMap() {
      const data = getFilteredData();
      markersLayer.clearLayers();

      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      if (currentMode === 'heat') {
        const points = data.map(f => [f.lat, f.lng, f.total_visits]);
        heatLayer = L.heatLayer(points, {
          radius: 35,
          blur: 25,
          maxZoom: 13,
          minOpacity: 0.4,
          max: Math.max(...data.map(f => f.total_visits)),
          gradient: {
            0.1: '#6366f1',
            0.3: '#06b6d4',
            0.5: '#22d3ee',
            0.65: '#4ade80',
            0.8: '#facc15',
            0.9: '#f97316',
            1.0: '#ef4444',
          },
        }).addTo(map);
      } else {
        const maxVisits = Math.max(...data.map(f => f.total_visits), 1);

        data.forEach(f => {
          const radius = 6 + (f.total_visits / maxVisits) * 24;

          const marker = L.circleMarker([f.lat, f.lng], {
            radius: radius,
            fillColor: '#f97316',
            fillOpacity: 0.7,
            color: '#fff',
            weight: 1.5,
          });

          marker.bindPopup(createPopup(f), { maxWidth: 280 });
          markersLayer.addLayer(marker);
        });
      }
    }

    function createPopup(f) {
      const maxYear = Math.max(...Object.values(f.visits_by_year));
      const yearBars = Object.entries(f.visits_by_year)
        .map(([y, c]) => `
          <div class="year-row">
            <span>${y}</span>
            <div class="year-bar"><div class="year-bar-fill" style="width:${(c / maxYear) * 100}%"></div></div>
            <span>${c}回</span>
          </div>
        `).join('');

      const urlLink = f.url
        ? `<a href="${f.url}" target="_blank" rel="noopener">公式サイト →</a>`
        : '';

      return `
        <div class="sento-popup">
          <h3>${f.name_ja}</h3>
          <div>
            <span class="visit-count">${f.total_visits}</span>
            <span class="visit-label">回訪問</span>
          </div>
          <div class="dates">${f.first_visit} 〜 ${f.last_visit}</div>
          <div class="year-breakdown">${yearBars}</div>
          ${urlLink}
        </div>
      `;
    }

    function flyTo(lat, lng, name) {
      map.flyTo([lat, lng], 14, { duration: 0.8 });
      markersLayer.eachLayer(layer => {
        if (layer.getLatLng().lat === lat && layer.getLatLng().lng === lng) {
          layer.openPopup();
        }
      });
    }

    init();
  </script>
</body>
</html>
